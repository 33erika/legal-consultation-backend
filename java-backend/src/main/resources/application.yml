server:
  port: 8080

spring:
  application:
    name: legal-consultation

  # SQLite Database Configuration
  datasource:
    url: jdbc:sqlite:./data/legal_consultation.db
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
        format_sql: true
    open-in-view: false

  # H2 Console (for debugging)
  h2:
    console:
      enabled: true
      path: /h2-console

# JWT Configuration
jwt:
  secret: legal-consultation-secret-key-2024-must-be-at-least-256-bits-long-for-hs256
  expiration: 86400000  # 24 hours in milliseconds

# DingTalk Configuration
dingtalk:
  webhook-url: ""
  enabled: false

# Logging
logging:
  level:
    com.legalsys: INFO
    org.hibernate.SQL: WARN
